<h2>Fixtures</h2>


<form action="">
<div style="display: flex; gap: 1%;">
  @for (option of options; track option.id){
    <input [(ngModel)]="selectedoption" type="radio" name="division" [value]="option.value">{{option.label}}
  }
</div>

<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">Division</th>
      <th scope="col">Home Team</th>
      <th scope="col">Score</th>
      <th scope="col">Score</th>
      <th scope="col">Away Team</th>
    </tr>
  </thead>
  <tbody>
  <!--print fixtures for the selected division, if all is selected print all divisions -->
     @for (fixture of fixtures; track fixture.id){
        <tr *ngIf="fixture.division == +selectedoption || +selectedoption === 0">
            <td>{{fixture.division}}</td>
            <td>{{fixture.hteam}}</td>
            <td>{{fixture.hteamscore}}</td>
            <td>{{fixture.ateamscore}}</td>
            <td>{{fixture.ateam}}</td>
        </tr>
    }

  </tbody>
</table>
</form>
